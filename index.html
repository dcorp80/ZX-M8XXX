            gap: 2px;
            padding: 10px;
            background: var(--bg-primary);
            min-width: 130px;
            overflow-y: auto;
        }
        .fullhelp-nav-btn {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            text-align: left;
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
        }
        .fullhelp-nav-btn:hover {
            background: var(--bg-button);
            color: var(--text-primary);
        }
        .fullhelp-nav-btn.active {
            background: var(--accent);
            color: #fff;
        }
        .fullhelp-section {
            flex: 1;
            padding: 20px 25px;
            overflow-y: auto;
            line-height: 1.6;
        }
        .fullhelp-section.hidden {
            display: none;
        }
        .fullhelp-section h4 {
            margin: 0 0 15px 0;
            color: var(--cyan);
            font-size: 18px;
            border-bottom: 1px solid var(--bg-button);
            padding-bottom: 8px;
        }
        .fullhelp-section h5 {
            margin: 20px 0 10px 0;
            color: var(--accent);
            font-size: 14px;
        }
        .fullhelp-section p {
            margin: 0 0 10px 0;
            color: var(--text-primary);
        }
        .fullhelp-section ul, .fullhelp-section ol {
            margin: 0 0 15px 0;
            padding-left: 25px;
        }
        .fullhelp-section li {
            margin-bottom: 5px;
        }
        .fullhelp-section code {
            background: var(--bg-primary);
            padding: 2px 6px;
            border-radius: 3px;
            font-family: monospace;
            font-size: 12px;
            color: var(--cyan);
        }
        .fullhelp-section pre {
            background: var(--bg-primary);
            padding: 15px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 11px;
            overflow-x: auto;
            line-height: 1.4;
            color: var(--text-primary);
        }
        .fullhelp-section table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 15px;
        }
        .fullhelp-section th, .fullhelp-section td {
            padding: 8px 12px;
            text-align: left;
            border-bottom: 1px solid var(--bg-button);
        }
        .fullhelp-section th {
            color: var(--cyan);
            font-weight: bold;
        }
        .fullhelp-section td:first-child {
            font-family: monospace;
            color: var(--accent);
            white-space: nowrap;
        }
        /* Bookmarks bar */
        .bookmarks-bar {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 2px 6px;
            background: var(--bg-tertiary);
            border-top: 1px solid var(--border-color);
            font-size: 10px;
            margin-bottom: -6px;
        }
        .bookmarks-label {
            color: var(--text-secondary);
            margin-right: 4px;
        }
        .bookmark-btn {
            min-width: 40px;
            padding: 2px 6px;
            font-family: monospace;
            font-size: 10px;
            background: var(--bg-button);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            border-radius: 3px;
            cursor: pointer;
        }
        .bookmark-btn:hover {
            background: var(--bg-hover);
        }
        .bookmark-btn.set {
            background: var(--bg-button);
            color: var(--text-primary);
        }
        .bookmark-btn.type-mismatch {
            color: var(--text-secondary);
            font-style: italic;
        }

        /* Game Browser Dialog */
        .gamebrowser-dialog {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .gamebrowser-dialog.hidden {
            display: none;
        }
        .gamebrowser-content {
            background: var(--bg-secondary);
            border-radius: 8px;
            width: 90vw;
            max-width: 1000px;
            height: 90vh;
            max-height: 700px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .gamebrowser-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 20px;
            border-bottom: 1px solid var(--bg-button);
            background: var(--bg-primary);
        }
        .gamebrowser-header h3 {
            margin: 0;
            color: var(--cyan);
            font-size: 16px;
        }
        .gamebrowser-close {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-size: 28px;
            cursor: pointer;
            padding: 0;
            line-height: 1;
        }
        .gamebrowser-close:hover {
            color: var(--text-primary);
        }
        .gamebrowser-search {
            display: flex;
            gap: 10px;
            padding: 12px 20px;
            border-bottom: 1px solid var(--bg-button);
            background: var(--bg-primary);
        }
        .gamebrowser-search input {
            flex: 1;
            padding: 8px 12px;
            border: 1px solid var(--bg-button);
            border-radius: 4px;
            background: var(--bg-secondary);
            color: var(--text-primary);
            font-size: 14px;
        }
        .gamebrowser-search input:focus {
            outline: none;
            border-color: var(--cyan);
        }
        .gamebrowser-search button {
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            background: var(--cyan);
            color: var(--bg-primary);
            cursor: pointer;
            font-weight: 500;
        }
        .gamebrowser-search button:hover {
            opacity: 0.9;
        }
        .gamebrowser-search button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .gamebrowser-source {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .gamebrowser-source label {
            display: flex;
            align-items: center;
            gap: 4px;
            color: var(--text-secondary);
            font-size: 12px;
            cursor: pointer;
        }
        .gamebrowser-body {
            flex: 1;
            display: flex;
            overflow: hidden;
        }
        .gamebrowser-results {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }
        .gamebrowser-item {
            display: flex;
            gap: 12px;
            padding: 10px;
            border-radius: 6px;
            cursor: pointer;
            border: 1px solid transparent;
            margin-bottom: 8px;
            background: var(--bg-primary);
        }
        .gamebrowser-item:hover {
            background: var(--bg-hover);
        }
        .gamebrowser-item.selected {
            border-color: var(--cyan);
            background: var(--bg-hover);
        }
        .gamebrowser-thumb {
            width: 80px;
            height: 60px;
            background: #000;
            border-radius: 4px;
            overflow: hidden;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .gamebrowser-thumb img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }
        .gamebrowser-thumb-placeholder {
            width: 100%;
            height: 100%;
            background:
                repeating-linear-gradient(
                    45deg,
                    transparent,
                    transparent 4px,
                    rgba(128, 128, 128, 0.4) 4px,
                    rgba(128, 128, 128, 0.4) 5px
                );
        }
        .gamebrowser-info {
            flex: 1;
            min-width: 0;
        }
        .gamebrowser-title {
            font-weight: 500;
            color: var(--text-primary);
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .gamebrowser-meta {
            font-size: 11px;
            color: var(--text-secondary);
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .gamebrowser-meta span {
            display: flex;
            align-items: center;
            gap: 3px;
        }
        .gamebrowser-score {
            color: var(--yellow);
        }
        .gamebrowser-source-badge {
            font-size: 9px;
            padding: 1px 5px;
            border-radius: 3px;
            background: var(--bg-button);
            color: var(--text-secondary);
        }
        .gamebrowser-unavailable {
            color: var(--red);
        }
        .gamebrowser-detail {
            width: 300px;
            border-left: 1px solid var(--bg-button);
            padding: 15px;
            overflow-y: auto;
            background: var(--bg-primary);
        }
        .gamebrowser-detail-title {
            font-size: 16px;
            font-weight: 500;
            color: var(--text-primary);
            margin-bottom: 10px;
        }
        .gamebrowser-detail-screen {
            width: 100%;
            background: #000;
            border-radius: 4px;
            margin-bottom: 10px;
            aspect-ratio: 4/3;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .gamebrowser-detail-screen img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }
        .gamebrowser-detail-info {
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 15px;
        }
        .gamebrowser-detail-info p {
            margin: 4px 0;
        }
        .gamebrowser-detail-info strong {
            color: var(--text-primary);
        }
        .gamebrowser-releases {
            margin-bottom: 15px;
        }
        .gamebrowser-releases-title {
            font-size: 12px;
            font-weight: 500;
            color: var(--text-primary);
            margin-bottom: 8px;
        }
        .gamebrowser-release {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 8px;
            background: var(--bg-secondary);
            border-radius: 4px;
            margin-bottom: 4px;
            font-size: 11px;
        }
        .gamebrowser-release-info {
            color: var(--text-secondary);
        }
        .gamebrowser-release button {
            padding: 3px 10px;
            border: none;
            border-radius: 3px;
            background: var(--cyan);
            color: var(--bg-primary);
            cursor: pointer;
            font-size: 11px;
        }
        .gamebrowser-release button:hover {
            opacity: 0.9;
        }
        .gamebrowser-release button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            background: var(--bg-button);
            color: var(--text-secondary);
        }
        .gamebrowser-release-note {
            font-size: 10px;
            color: var(--text-dim);
            padding: 4px 8px;
            font-style: italic;
        }
        .gamebrowser-release-format {
            font-weight: 600;
            color: var(--cyan);
            min-width: 35px;
        }
        .gamebrowser-release-link {
            background: transparent;
            justify-content: center;
            margin-top: 8px;
        }
        .gamebrowser-release-link a {
            color: var(--cyan);
            text-decoration: none;
            font-size: 11px;
        }
        .gamebrowser-release-link a:hover {
            text-decoration: underline;
        }
        .gamebrowser-download-btn {
            padding: 3px 10px;
            border: none;
            border-radius: 3px;
            background: var(--cyan);
            color: var(--bg-primary);
            cursor: pointer;
            font-size: 11px;
            text-decoration: none;
        }
        .gamebrowser-download-btn:hover {
            opacity: 0.9;
        }
        .gamebrowser-source-info {
            font-size: 11px;
            color: var(--text-dim);
            margin-left: auto;
        }
        .gamebrowser-source-info a {
            color: var(--cyan);
            text-decoration: none;
        }
        .gamebrowser-source-info a:hover {
            text-decoration: underline;
        }
        .gamebrowser-external {
            margin-top: 10px;
        }
        .gamebrowser-external a {
            display: inline-block;
            padding: 4px 10px;
            background: var(--bg-button);
            color: var(--text-primary);
            text-decoration: none;
            border-radius: 4px;
            font-size: 11px;
            margin-right: 5px;
        }
        .gamebrowser-external a:hover {
            background: var(--bg-hover);
        }
        .gamebrowser-pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            padding: 10px;
            border-top: 1px solid var(--bg-button);
            background: var(--bg-primary);
        }
        .gamebrowser-pagination button {
            padding: 5px 15px;
            border: none;
            border-radius: 4px;
            background: var(--bg-button);
            color: var(--text-primary);
            cursor: pointer;
        }
        .gamebrowser-pagination button:hover:not(:disabled) {
            background: var(--bg-hover);
        }
        .gamebrowser-pagination button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .gamebrowser-pagination span {
            color: var(--text-secondary);
            font-size: 12px;
        }
        .gamebrowser-status {
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
        }
        .gamebrowser-loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        .gamebrowser-spinner {
            width: 30px;
            height: 30px;
            border: 3px solid var(--bg-button);
            border-top-color: var(--cyan);
            border-radius: 50%;
            animation: gamebrowser-spin 1s linear infinite;
        }
        @keyframes gamebrowser-spin {
            to { transform: rotate(360deg); }
        }
        .gamebrowser-error {
            color: var(--red);
        }
    </style>
</head>
<body>
    <!-- ROM, ZIP modals moved to Svelte: src/components/modals/ -->

    <style>
        .zip-file-list {
            max-height: 300px;
            overflow-y: auto;
            margin: 15px 0;
        }
        .zip-file-item {
            padding: 10px 15px;
            margin: 5px 0;
            background: #2a2a3a;
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .zip-file-item:hover {
            background: #3a3a4a;
        }
        .zip-file-name {
            color: var(--cyan);
        }
        .zip-file-type {
            color: #888;
            font-size: 12px;
            text-transform: uppercase;
            min-width: 50px;
        }
        .zip-file-info {
            color: #666;
            font-size: 11px;
            font-family: monospace;
        }
    </style>

    <div class="container">
        <!-- TopBar moved to Svelte: src/components/shell/TopBar.svelte -->
        <div id="topbar-mount" style="display:contents"></div>
        
        <div class="main-layout">
        <div class="emulator-section">
        <!-- ScreenDisplay moved to Svelte: src/components/shell/ScreenDisplay.svelte -->
        <div id="screen-mount" style="display:contents"></div>

        <!-- StatusBar moved to Svelte: src/components/shell/StatusBar.svelte -->
        <div id="statusbar-mount" style="display:contents"></div>
        
        <!-- ControlPanel + file inputs moved to Svelte: src/components/shell/ControlPanel.svelte -->
        <div id="controls-mount" style="display:contents"></div>
        </div><!-- emulator-section -->

        <!-- Tab Container -->
        <div class="tab-container" id="tabContainer">
            <!-- TabBar moved to Svelte: src/components/shell/TabBar.svelte -->
            <div id="tabbar-mount" style="display:contents"></div>

            <!-- Debugger Tab -->
            <!-- DebuggerTab moved to Svelte: src/components/tabs/DebuggerTab.svelte -->
            <div id="tab-debugger-mount" style="display:contents"></div>

        <!-- Assembler Tab -->
            <!-- AssemblerTab moved to Svelte: src/components/tabs/AssemblerTab.svelte -->
            <div id="tab-assembler-mount" style="display:contents"></div>

        <!-- Opcodes Tab -->
        <!-- Graphics Viewer Tab -->
            <!-- GraphicsTab moved to Svelte: src/components/tabs/GraphicsTab.svelte -->
            <div id="tab-graphics-mount" style="display:contents"></div>

        <!-- Info Tab -->
            <!-- InfoTab moved to Svelte: src/components/tabs/InfoTab.svelte -->
            <div id="tab-info-mount" style="display:contents"></div>

        <!-- Settings Tab -->
            <!-- SettingsTab moved to Svelte: src/components/tabs/SettingsTab.svelte -->
            <div id="tab-settings-mount" style="display:contents"></div>

        <!-- Tools Tab -->
            <!-- ToolsTab moved to Svelte: src/components/tabs/ToolsTab.svelte -->
            <div id="tab-tools-mount" style="display:contents"></div>

        </div><!-- tab-container -->
    </div><!-- main-layout -->

    <!-- Memory Map, Keyboard Help modals moved to Svelte: src/components/modals/ -->
    
    <!-- Label Edit Dialog -->
    <div class="label-dialog hidden" id="labelDialog">
        <div class="label-dialog-content">
            <h4 id="labelDialogTitle">Add Label</h4>
            <div class="label-dialog-row">
                <label>Address</label>
                <input type="text" id="labelAddrInput" readonly>
            </div>
            <div class="label-dialog-row">
                <label>Name</label>
                <input type="text" id="labelNameInput" placeholder="LABEL_NAME" maxlength="32">
            </div>
            <div class="label-dialog-row">
                <label>Comment (optional)</label>
                <input type="text" id="labelCommentInput" placeholder="Description..." maxlength="100">
            </div>
            <div class="label-dialog-row">
                <label>Size (bytes, 1 = code)</label>
                <input type="number" id="labelSizeInput" value="1" min="1" max="65536">
            </div>
            <div class="label-dialog-buttons">
                <button id="btnLabelSave">Save</button>
                <button id="btnLabelCancel">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Region Mark Dialog -->
    <div class="label-dialog hidden" id="regionDialog">
        <div class="label-dialog-content">
            <h4 id="regionDialogTitle">Mark Region</h4>
            <div class="label-dialog-row">
                <label>Start Address</label>
                <input type="text" id="regionStartInput" readonly>
            </div>
            <div class="label-dialog-row">
                <label>End Address</label>
                <input type="text" id="regionEndInput" placeholder="FFFF" maxlength="4">
            </div>
            <div class="label-dialog-row">
                <label>Type</label>
                <select id="regionTypeSelect">
                    <option value="code">Code</option>
                    <option value="db">DB (bytes)</option>
                    <option value="dw">DW (words)</option>
                    <option value="text">Text (ASCII)</option>
                    <option value="graphics">Graphics</option>
                    <option value="smc">SMC (self-modifying)</option>
                </select>
            </div>
            <div class="label-dialog-row">
                <label>Comment (optional)</label>
                <input type="text" id="regionCommentInput" placeholder="Description..." maxlength="100">
            </div>
            <div class="label-dialog-buttons">
                <button id="btnRegionSave">Mark</button>
                <button id="btnRegionCancel">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Fold Block Dialog -->
    <div class="label-dialog hidden" id="foldDialog">
        <div class="label-dialog-content">
            <h4>Create Fold Block</h4>
            <div class="label-dialog-row">
                <label>Start Address</label>
                <input type="text" id="foldStartInput" readonly>
            </div>
            <div class="label-dialog-row">
                <label>End Address</label>
                <input type="text" id="foldEndInput" placeholder="FFFF" maxlength="4">
            </div>
            <div class="label-dialog-row">
                <label>Name (optional)</label>
                <input type="text" id="foldNameInput" placeholder="e.g. Sprite Data" maxlength="50">
            </div>
            <div class="label-dialog-buttons">
                <button id="btnFoldSave">Create</button>
                <button id="btnFoldCancel">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Comment Dialog -->
    <div class="label-dialog hidden" id="commentDialog">
        <div class="label-dialog-content" style="width: 400px;">
            <h4 id="commentDialogTitle">Edit Comment</h4>
            <div class="label-dialog-row">
                <label>Address</label>
                <input type="text" id="commentAddrInput" readonly>
            </div>
            <div class="label-dialog-row">
                <label><input type="checkbox" id="commentSeparator"> Add separator line (----------)</label>
            </div>
            <div class="label-dialog-row">
                <label>Before (multiline)</label>
                <textarea id="commentBeforeInput" rows="3" placeholder="Comment before instruction..."></textarea>
            </div>
            <div class="label-dialog-row">
                <label>Inline</label>
                <input type="text" id="commentInlineInput" placeholder="Short comment on same line" maxlength="60">
            </div>
            <div class="label-dialog-row">
                <label>After (multiline)</label>
                <textarea id="commentAfterInput" rows="3" placeholder="Comment after instruction..."></textarea>
            </div>
            <div class="label-dialog-buttons">
                <button id="btnCommentSave">Save</button>
                <button id="btnCommentDelete" class="danger">Delete</button>
                <button id="btnCommentCancel">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Export Disasm Dialog -->
    <div class="label-dialog hidden" id="exportDisasmDialog">
        <div class="label-dialog-content">
            <h4>Export Disassembly</h4>
            <div class="label-dialog-row">
                <label>Start Address</label>
                <input type="text" id="exportStartAddr" placeholder="0000" maxlength="4">
            </div>
            <div class="label-dialog-row">
                <label>End Address</label>
                <input type="text" id="exportEndAddr" placeholder="FFFF" maxlength="4">
            </div>
            <div class="label-dialog-row">
                <label>Options</label>
                <div class="export-options">
                    <label><input type="checkbox" id="exportWithOrg" checked> ORG directive</label>
                    <label><input type="checkbox" id="exportWithAddr" checked> Address comments</label>
                    <label><input type="checkbox" id="exportWithBytes"> Byte comments</label>
                    <label><input type="checkbox" id="exportWithTstates"> T-states</label>
                </div>
            </div>
            <div class="label-dialog-buttons">
                <button id="btnExportSave">Export</button>
                <button id="btnExportCancel">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Gamepad Calibration Dialog -->
    <div class="label-dialog hidden" id="gamepadCalibDialog">
        <div class="label-dialog-content" style="width: 350px;">
            <h4>Gamepad Calibration</h4>
            <div id="gamepadCalibInfo" style="margin-bottom: 10px; font-size: 12px; color: var(--text-dim);">
                No gamepad detected
            </div>
            <div style="margin-bottom: 15px;">
                <table style="width: 100%; font-size: 12px;">
                    <tr>
                        <td style="padding: 4px;">Up:</td>
                        <td id="gamepadMapUp" style="color: var(--cyan);">-</td>
                        <td><button class="small-btn gamepad-assign-btn" data-dir="up">Assign</button></td>
                    </tr>
                    <tr>
                        <td style="padding: 4px;">Down:</td>
                        <td id="gamepadMapDown" style="color: var(--cyan);">-</td>
                        <td><button class="small-btn gamepad-assign-btn" data-dir="down">Assign</button></td>
                    </tr>
                    <tr>
                        <td style="padding: 4px;">Left:</td>
                        <td id="gamepadMapLeft" style="color: var(--cyan);">-</td>
                        <td><button class="small-btn gamepad-assign-btn" data-dir="left">Assign</button></td>
                    </tr>
                    <tr>
                        <td style="padding: 4px;">Right:</td>
                        <td id="gamepadMapRight" style="color: var(--cyan);">-</td>
                        <td><button class="small-btn gamepad-assign-btn" data-dir="right">Assign</button></td>
                    </tr>
                    <tr>
                        <td style="padding: 4px;">Fire:</td>
                        <td id="gamepadMapFire" style="color: var(--cyan);">-</td>
                        <td><button class="small-btn gamepad-assign-btn" data-dir="fire">Assign</button></td>
                    </tr>
                    <tr><td colspan="3" style="padding: 6px 0 2px; color: var(--text-dim); font-size: 11px;">Extended (optional):</td></tr>
